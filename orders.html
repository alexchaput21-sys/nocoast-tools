<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Coast — Order Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111213; --surface:#18191b; --surface2:#1f2023;
  --border:#2c2d30; --border-hi:#454648;
  --gold:#c9951a; --gold-dim:rgba(201,149,26,0.15);
  --text:#dfe0e3; --text-dim:#7a7c82; --text-muted:#434548;
  --green:#22c55e; --blue:#3b82f6; --orange:#f97316; --purple:#a855f7; --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
body{display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.back-btn{color:var(--text-dim);text-decoration:none;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;transition:color .1s;display:flex;align-items:center;gap:4px;}
.back-btn:hover{color:var(--gold);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--gold);}
.logo span{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.18em;color:var(--text-muted);display:block;margin-top:-3px;text-transform:uppercase;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.sync-text{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-muted);}
.btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn:hover{border-color:var(--border-hi);color:var(--text);}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:500;}
.btn-gold:hover{background:#b8860b;border-color:#b8860b;color:#000;}
.config-bar{display:flex;align-items:center;gap:8px;padding:7px 20px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.config-input{background:var(--bg);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:.65rem;padding:5px 8px;width:340px;outline:none;max-width:100%;}
.config-input:focus{border-color:var(--gold);color:var(--text);}
.config-input::placeholder{color:var(--text-muted);}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
.conn-dot.ok{background:var(--green);}
.conn-dot.err{background:var(--red);}
.conn-dot.spin{background:var(--orange);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.conn-text{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-muted);}
.statsbar{display:flex;gap:1px;background:var(--border);}
.stat{flex:1;background:var(--surface);padding:12px 18px;}
.stat-lbl{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;line-height:1;margin-top:2px;}
.stat-val.gold{color:var(--gold);}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--blue);}
.stat-val.orange{color:var(--orange);}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;overflow-x:auto;}
.tab{padding:10px 16px;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .1s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.controls{display:flex;gap:8px;padding:10px 20px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.ctrl-select{background:var(--bg);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:.65rem;padding:5px 8px;cursor:pointer;outline:none;transition:border-color .1s;}
.ctrl-select:focus{border-color:var(--gold);}
.ctrl-label{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-muted);display:flex;align-items:center;gap:5px;cursor:pointer;}
.table-wrap{overflow-x:auto;flex:1;}
table{width:100%;border-collapse:collapse;min-width:860px;}
thead th{background:var(--surface2);padding:8px 10px;text-align:left;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:8px 10px;vertical-align:middle;font-size:.82rem;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.06em;border:1px solid;white-space:nowrap;}
.b-delivered{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green);}
.b-shipped{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--blue);}
.b-transit{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.3);color:var(--orange);}
.b-processing{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3);color:var(--purple);}
.b-invoiced{background:rgba(201,149,26,.1);border-color:rgba(201,149,26,.3);color:var(--gold);}
.vendor-tag{display:inline-block;padding:2px 6px;background:var(--surface2);border:1px solid var(--border);font-size:.7rem;white-space:nowrap;}
.order-num{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;}
.items-cell{font-size:.75rem;color:var(--text-dim);max-width:175px;}
.item-line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
.more{color:var(--text-muted);font-size:.65rem;}
.amount-val{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--gold);}
.amount-unk{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text-muted);font-style:italic;}
.track-link{color:var(--blue);text-decoration:none;font-family:'DM Mono',monospace;font-size:.65rem;display:block;line-height:1.6;}
.track-link:hover{text-decoration:underline;}
.track-plain{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-muted);display:block;line-height:1.6;}
.assign-sel{background:var(--bg);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:.65rem;padding:4px 6px;cursor:pointer;max-width:165px;transition:all .12s;outline:none;width:100%;}
.assign-sel:focus{border-color:var(--gold);}
.assign-sel.has-value{border-color:rgba(201,149,26,.5);color:var(--gold);}
.save-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-top:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.save-info{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-muted);}
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;padding:16px 20px;}
.cust-card{background:var(--surface);border:1px solid var(--border);padding:14px;}
.cust-card h3{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.cust-vehicle{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-dim);margin-bottom:10px;}
.cust-spend{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);}
.cust-spend-sub{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text-muted);margin-top:1px;}
.cust-orders{margin-top:10px;border-top:1px solid var(--border);padding-top:8px;}
.cust-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.75rem;border-bottom:1px solid var(--surface2);}
.cust-row:last-child{border-bottom:none;}
.cust-vendor{color:var(--text-dim);}
.cust-amt{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--gold);}
.cust-amt.unk{color:var(--text-muted);font-style:italic;}
.unassigned-card{border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.04);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);padding:10px 16px;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text);z-index:500;animation:slideIn .18s;display:none;max-width:280px;}
.toast.err{border-left-color:var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:translateX(0);}}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:400;}
.loading-overlay.hidden{display:none;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;}
@media(max-width:600px){
  .topbar{padding:0 12px;}
  .config-input{width:100%;}
  .controls{padding:8px 12px;}
  .statsbar{flex-wrap:wrap;}
  .stat{min-width:50%;}
  .save-bar{padding:8px 12px;}
  .cust-grid{padding:12px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="logo">No Coast Orders<span>Supply Tracker</span></div>
  </div>
  <div class="topbar-right">
    <span class="sync-text" id="syncText">—</span>
    <button class="btn" onclick="loadAll()">↻ Refresh</button>
    <button class="btn btn-gold" onclick="openAddModal()">+ Add Order</button>
  </div>
</div>

<div class="config-bar">
  <div class="conn-dot spin" id="connDot"></div>
  <span class="conn-text" id="connText">Paste Apps Script exec URL to connect</span>
  <input class="config-input" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" oninput="saveUrl()">
</div>

<div class="statsbar">
  <div class="stat"><div class="stat-lbl">Total Orders</div><div class="stat-val" id="sTotal">—</div></div>
  <div class="stat"><div class="stat-lbl">Confirmed Spend</div><div class="stat-val gold" id="sSpend">—</div></div>
  <div class="stat"><div class="stat-lbl">Delivered</div><div class="stat-val green" id="sDelivered">—</div></div>
  <div class="stat"><div class="stat-lbl">In Transit</div><div class="stat-val blue" id="sTransit">—</div></div>
  <div class="stat"><div class="stat-lbl">Unassigned</div><div class="stat-val orange" id="sUnassigned">—</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('orders',this)">📦 All Orders</div>
  <div class="tab" onclick="switchTab('bycustomer',this)">👤 By Customer</div>
</div>

<div class="tab-panel active" id="tab-orders">
  <div class="controls">
    <select class="ctrl-select" id="custFilter" onchange="renderOrders()"><option value="">All Customers</option></select>
    <select class="ctrl-select" id="statusFilter" onchange="renderOrders()">
      <option value="">All Statuses</option>
      <option value="delivered">✅ Delivered</option>
      <option value="shipped">📦 Shipped</option>
      <option value="transit">🚚 In Transit</option>
      <option value="processing">🕐 Processing</option>
      <option value="invoiced">🧾 Invoiced</option>
    </select>
    <select class="ctrl-select" id="vendorFilter" onchange="renderOrders()"><option value="">All Vendors</option></select>
    <label class="ctrl-label"><input type="checkbox" id="hideUnassigned" onchange="renderOrders()"> Hide unassigned</label>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Date</th><th>Vendor</th><th>Order #</th><th>Items</th>
        <th>Amount</th><th>Assign to Customer</th><th>Tracking</th><th>Status</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="save-bar">
    <span class="save-info" id="assignInfo">Loading…</span>
  </div>
</div>

<div class="tab-panel" id="tab-bycustomer">
  <div class="cust-grid" id="custGrid"></div>
</div>

<div id="addModal" style="position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:300;padding:16px;">
  <div style="background:var(--surface);border:1px solid var(--border);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);">New Order</span>
      <button onclick="closeAdd()" style="background:none;border:none;color:var(--text-muted);font-size:1.1rem;cursor:pointer;">✕</button>
    </div>
    <div style="padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div style="display:flex;flex-direction:column;gap:5px;">
        <label style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);">Vendor *</label>
        <input id="a_vendor" placeholder="e.g. Midwest Fabrics" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:7px 9px;outline:none;width:100%;">
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <label style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);">Order #</label>
        <input id="a_ordernum" placeholder="e.g. #18547" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:7px 9px;outline:none;width:100%;">
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;grid-column:1/-1;">
        <label style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);">Items</label>
        <input id="a_items" placeholder="e.g. Headliner Fabric ×3, Hog Rings ×1" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:7px 9px;outline:none;width:100%;">
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <label style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);">Amount ($)</label>
        <input id="a_amount" type="number" step="0.01" placeholder="e.g. 207.82" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;padding:7px 9px;outline:none;width:100%;">
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <label style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);">Status</label>
        <select id="a_status" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;padding:7px 9px;outline:none;cursor:pointer;width:100%;">
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="transit">In Transit</option>
          <option value="delivered">Delivered</option>
          <option value="invoiced">Invoiced</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;grid-column:1/-1;">
        <label style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);">Assign to Customer</label>
        <select id="a_customer" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;padding:7px 9px;outline:none;cursor:pointer;width:100%;"></select>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;grid-column:1/-1;">
        <label style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);">Tracking (carrier: number)</label>
        <input id="a_tracking" placeholder="e.g. Spee-Dee: SP003449041122628372" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;padding:7px 9px;outline:none;width:100%;">
      </div>
    </div>
    <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-gold" onclick="submitAdd()">Save Order</button>
    </div>
  </div>
</div>

<div class="loading-overlay hidden" id="loader"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const STATUS_MAP = {
  delivered:{cls:'b-delivered',lbl:'✅ Delivered'},
  shipped:{cls:'b-shipped',lbl:'📦 Shipped'},
  transit:{cls:'b-transit',lbl:'🚚 In Transit'},
  processing:{cls:'b-processing',lbl:'🕐 Processing'},
  invoiced:{cls:'b-invoiced',lbl:'🧾 Invoiced'}
};
let orders = [], customers = [];

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('nc_crm_url');
  if (saved) { document.getElementById('scriptUrl').value = saved; loadAll(); }
  else setConn(null, 'Paste your Apps Script exec URL above to connect');
});

function saveUrl() { const v=document.getElementById('scriptUrl').value.trim(); if(v) localStorage.setItem('nc_crm_url',v); }
function getUrl() { return document.getElementById('scriptUrl').value.trim(); }

async function apiFetch(params) {
  const url=getUrl(); if(!url){showToast('Paste your Apps Script URL first','err');return null;}
  const res=await fetch(`${url}?${new URLSearchParams(params).toString()}`);
  return res.json();
}

async function loadAll() {
  const url=getUrl(); if(!url) return;
  setLoading(true); setConn('spin','Connecting…');
  try {
    const [od,ld] = await Promise.all([apiFetch({action:'getOrders'}),apiFetch({action:'getLeads'})]);
    if(od&&!od.error){ orders=Array.isArray(od)?od:[]; setConn('ok',`Connected · ${orders.length} orders, ${(ld||[]).length} customers`); }
    else setConn('err','Error loading orders — check URL');
    if(ld&&!ld.error&&Array.isArray(ld)) customers=ld.map(l=>({id:String(l['ID']||''),name:l['Customer Name']||'',vehicle:l['Vehicle']||'',status:l['Status']||''})).filter(c=>c.name);
    document.getElementById('syncText').textContent='Synced '+new Date().toLocaleTimeString();
    renderAll();
  } catch(e){ setConn('err','Connection failed'); showToast('Connection failed','err'); }
  finally { setLoading(false); }
}

function renderAll(){ renderOrders(); renderByCustomer(); updateStats(); refreshFilters(); renderCustomerDropdowns(); }

function renderOrders() {
  const cf=document.getElementById('custFilter').value;
  const sf=document.getElementById('statusFilter').value;
  const vf=document.getElementById('vendorFilter').value;
  const hu=document.getElementById('hideUnassigned').checked;
  const filtered=orders.filter(o=>{
    const cust=o['CustomerAssignment']||o.customerAssignment||'';
    if(cf&&cust!==cf)return false;
    if(sf&&(o['Status']||o.status||'')!==sf)return false;
    if(vf&&(o['Vendor']||o.vendor||'')!==vf)return false;
    if(hu&&!cust)return false;
    return true;
  });
  const tbody=document.getElementById('tableBody');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="8" class="empty">No orders match.</td></tr>`;return;}
  tbody.innerHTML=filtered.map(o=>{
    const id=o['ID']||o.id||'', date=o['Date']||o.date||'', vendor=o['Vendor']||o.vendor||'', orderNum=o['OrderNum']||o.orderNum||'';
    const rawItems=o['Items']||o.items||'[]', items=Array.isArray(rawItems)?rawItems:tryParseJson(rawItems,[]);
    const amount=parseFloat(o['Amount']||o.amount||''), status=(o['Status']||o.status||'processing').toLowerCase();
    const rawTracking=o['Tracking']||o.tracking||'[]', tracking=Array.isArray(rawTracking)?rawTracking:tryParseJson(rawTracking,[]);
    const assigned=o['CustomerAssignment']||o.customerAssignment||'';
    const sc=STATUS_MAP[status]||{cls:'b-processing',lbl:status};
    const amtHtml=!isNaN(amount)&&amount>0?`<span class="amount-val">$${amount.toFixed(2)}</span>`:`<span class="amount-unk">See invoice</span>`;
    const trackHtml=tracking.map(t=>{const n=t.num||t.n||'',u=t.url||t.u||null,c=t.carrier||t.c||'',short=n.length>20?n.slice(0,9)+'…'+n.slice(-7):n;return u?`<a href="${esc(u)}" class="track-link" target="_blank">${esc(c)}: ${esc(short)}</a>`:`<span class="track-plain">${esc(c)}: ${esc(n)}</span>`;}).join('');
    const itemsHtml=items.slice(0,2).map(i=>`<div class="item-line" title="${esc(i)}">${esc(i)}</div>`).join('')+(items.length>2?`<div class="more">+${items.length-2} more</div>`:'');
    const custOpts=customers.map(c=>{const val=c.name+(c.vehicle?` — ${c.vehicle}`:'');return `<option value="${esc(val)}"${assigned===val?' selected':''}>${esc(c.name)}${c.vehicle?' — '+esc(c.vehicle):''}</option>`;}).join('');
    const hasExtra=assigned&&!customers.some(c=>c.name+(c.vehicle?` — ${c.vehicle}`:'')=== assigned);
    return `<tr>
      <td style="color:var(--text-muted);font-size:.72rem;white-space:nowrap">${esc(date)}</td>
      <td><span class="vendor-tag">${esc(vendor)}</span></td>
      <td><span class="order-num">${esc(orderNum)}</span></td>
      <td><div class="items-cell">${itemsHtml}</div></td>
      <td>${amtHtml}</td>
      <td><select class="assign-sel${assigned?' has-value':''}" data-id="${esc(id)}" onchange="saveAssignment(this,'${esc(id)}')">
        <option value="">— Unassigned —</option>
        ${hasExtra?`<option value="${esc(assigned)}" selected>${esc(assigned)}</option>`:''}
        ${custOpts}
      </select></td>
      <td>${trackHtml||'<span class="track-plain">—</span>'}</td>
      <td><span class="badge ${sc.cls}">${sc.lbl}</span></td>
    </tr>`;
  }).join('');
  const asgn=orders.filter(o=>o['CustomerAssignment']||o.customerAssignment).length;
  document.getElementById('assignInfo').textContent=`${asgn} of ${orders.length} orders assigned to customers`;
}

async function saveAssignment(sel,id) {
  const val=sel.value; sel.classList.toggle('has-value',!!val);
  const o=orders.find(x=>(x['ID']||x.id)==id); if(o) o['CustomerAssignment']=val;
  updateStats(); renderByCustomer(); refreshFilters();
  document.getElementById('assignInfo').textContent='Saving…';
  try {
    const res=await apiFetch({action:'updateOrderField',id,field:'CustomerAssignment',value:val});
    if(res&&res.success){ showToast(val?`Assigned to ${val.split(' — ')[0]}`:'Unassigned'); const asgn=orders.filter(o=>o['CustomerAssignment']||o.customerAssignment).length; document.getElementById('assignInfo').textContent=`${asgn} of ${orders.length} orders assigned`; }
    else showToast('Save failed','err');
  } catch(e){ showToast('Error saving','err'); }
}

function renderByCustomer() {
  const groups={};
  orders.forEach(o=>{ const a=o['CustomerAssignment']||o.customerAssignment||'__none__'; if(!groups[a])groups[a]=[]; groups[a].push(o); });
  const keys=Object.keys(groups).sort(k=>k==='__none__'?1:-1);
  document.getElementById('custGrid').innerHTML=keys.map(k=>{
    const list=groups[k], isNone=k==='__none__';
    const spend=list.reduce((s,o)=>s+Math.max(0,parseFloat(o['Amount']||o.amount||'0')||0),0);
    const unkCount=list.filter(o=>!(parseFloat(o['Amount']||o.amount||'0')>0)).length;
    const rows=list.map(o=>{const amt=parseFloat(o['Amount']||o.amount||'0');const vendor=o['Vendor']||o.vendor||'';const num=o['OrderNum']||o.orderNum||'';return `<div class="cust-row"><span class="cust-vendor">${esc(vendor)} ${esc(num)}</span><span class="cust-amt${amt>0?'':' unk'}">${amt>0?'$'+amt.toFixed(2):'See inv.'}</span></div>`;}).join('');
    const [name,vehicle]=k.split(' — ');
    return `<div class="cust-card${isNone?' unassigned-card':''}"><h3>${esc(isNone?'⚠️ Unassigned':name)}</h3>${!isNone&&vehicle?`<div class="cust-vehicle">${esc(vehicle)}</div>`:`<div class="cust-vehicle">${list.length} order${list.length!==1?'s':''}</div>`}<div class="cust-spend">$${spend.toFixed(2)}</div><div class="cust-spend-sub">${spend>0?'confirmed spend':''} ${unkCount>0?`+ ${unkCount} see-invoice`:''}</div><div class="cust-orders">${rows}</div></div>`;
  }).join('')||`<div class="empty">No orders yet.</div>`;
}

function updateStats() {
  const total=orders.length, spend=orders.reduce((s,o)=>s+Math.max(0,parseFloat(o['Amount']||o.amount||'0')||0),0);
  const delivered=orders.filter(o=>(o['Status']||o.status||'').toLowerCase()==='delivered').length;
  const transit=orders.filter(o=>['shipped','transit'].includes((o['Status']||o.status||'').toLowerCase())).length;
  const unassigned=orders.filter(o=>!(o['CustomerAssignment']||o.customerAssignment)).length;
  document.getElementById('sTotal').textContent=total||'—';
  document.getElementById('sSpend').textContent=spend>0?'$'+spend.toFixed(2):'—';
  document.getElementById('sDelivered').textContent=delivered||'0';
  document.getElementById('sTransit').textContent=transit||'0';
  document.getElementById('sUnassigned').textContent=unassigned||'0';
}

function refreshFilters() {
  const vendors=[...new Set(orders.map(o=>o['Vendor']||o.vendor||'').filter(Boolean))].sort();
  const vf=document.getElementById('vendorFilter'),vCur=vf.value;
  vf.innerHTML='<option value="">All Vendors</option>'+vendors.map(v=>`<option${v===vCur?' selected':''}>${esc(v)}</option>`).join('');
  const custs=[...new Set(orders.map(o=>o['CustomerAssignment']||o.customerAssignment||'').filter(Boolean))].sort();
  const cf=document.getElementById('custFilter'),cCur=cf.value;
  cf.innerHTML='<option value="">All Customers</option>'+custs.map(c=>`<option value="${esc(c)}"${c===cCur?' selected':''}>${esc(c)}</option>`).join('');
}

function renderCustomerDropdowns() {
  const opts='<option value="">— Unassigned —</option>'+customers.map(c=>{const val=c.name+(c.vehicle?` — ${c.vehicle}`:'');return `<option value="${esc(val)}">${esc(c.name)}${c.vehicle?' — '+esc(c.vehicle):''}</option>`;}).join('');
  document.querySelectorAll('.assign-sel').forEach(s=>{const cur=s.value;s.innerHTML=opts;s.value=cur;});
  document.getElementById('a_customer').innerHTML=opts;
}

function openAddModal() {
  ['a_vendor','a_ordernum','a_items','a_amount','a_tracking'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('a_status').value='processing';
  renderCustomerDropdowns();
  document.getElementById('addModal').style.display='flex';
}
function closeAdd(){ document.getElementById('addModal').style.display='none'; }

async function submitAdd() {
  const vendor=document.getElementById('a_vendor').value.trim();
  if(!vendor){showToast('Vendor is required','err');return;}
  const trackRaw=document.getElementById('a_tracking').value.trim();
  const tracking=trackRaw?[{carrier:trackRaw.split(':')[0]?.trim(),num:trackRaw.split(':').slice(1).join(':').trim(),url:null}]:[];
  const items=document.getElementById('a_items').value.split(',').map(s=>s.trim()).filter(Boolean);
  const amount=parseFloat(document.getElementById('a_amount').value)||null;
  setLoading(true);
  try {
    const data={date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}),dateSort:new Date().toISOString().slice(0,10),vendor,orderNum:document.getElementById('a_ordernum').value.trim(),items:JSON.stringify(items),amount:amount||'',status:document.getElementById('a_status').value,tracking:JSON.stringify(tracking),customerAssignment:document.getElementById('a_customer').value,dateAdded:new Date().toLocaleDateString()};
    const res=await apiFetch({action:'addOrder',data:encodeURIComponent(JSON.stringify(data))});
    if(res&&res.success){closeAdd();await loadAll();showToast('Order added ✓');}
    else showToast(res?.error||'Failed to add','err');
  } catch(e){showToast('Error: '+e.message,'err');}
  finally{setLoading(false);}
}

function switchTab(id,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('tab-'+id).classList.add('active');}
function setConn(state,msg){const d=document.getElementById('connDot'),t=document.getElementById('connText');d.className='conn-dot'+(state?' '+state:'');t.textContent=msg;}
function setLoading(on){document.getElementById('loader').classList.toggle('hidden',!on);}
let toastTmr;
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');t.style.display='block';clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.style.display='none',2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tryParseJson(s,fallback){try{return JSON.parse(s);}catch{return fallback;}}
</script>
</body>
</html>
